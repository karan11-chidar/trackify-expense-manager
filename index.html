<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Elite | Premium UI</title>
<link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand"><i data-lucide="shield-check"></i><span>TASKMASTER ELITE</span></div>
        <nav class="nav-menu">
            <div class="nav-item active"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></div>
            <div class="nav-item"><i data-lucide="calendar"></i><span>Schedule</span></div>
            <div class="nav-item"><i data-lucide="pie-chart"></i><span>Analytics</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuBtn"><i data-lucide="menu"></i></button>
            <div class="search-box"><i data-lucide="search"></i><input type="text" placeholder="Search tasks..."></div>
            <button class="btn-primary" id="addTaskBtn">+ Create Task</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><p>Productivity</p><h3>84.2%</h3></div>
            <div class="stat-card"><p>Active Tasks</p><h3>12</h3></div>
            <div class="stat-card"><p>Milestones</p><h3>05</h3></div>
        </div>

        <h2 style="margin-bottom: 1.5rem; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; color: var(--text-dim);">
            <i data-lucide="zap" style="color: var(--accent); width: 18px;"></i> Master Focus Board
        </h2>

           <div class="task-grid" id="task-grid">
            <!-- task listed here -->
             <!-- TASK CARD -->
            </div>
    </main>
</div>

<!-- MODAL WITH PRIORITY DROPDOWN -->
<div class="modal-overlay" id="taskModal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;">New Task</h2>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="What needs to be done?" class="modal-input" id="titleInput">
            <!-- 🚩 PRIORITY DROPDOWN ADDED HERE -->
            <div style="position: relative;">
                <select class="modal-input" id="prioritySelect">
                    <option value="" disabled selected>Select Priority Level</option>
                    <option value="low">🟢 Low Priority</option>
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                </select>
            </div>

            <textarea placeholder="Task details..." class="modal-input" style="min-height: 100px; resize: none;" id="descriptionInput"></textarea>
            <input type="date" id="date-picker" class="modal-input">
            <input type="time" id="time-picker" class="modal-input">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" style="flex: 1;" id="saveModal">Save Task</button>
                <button class="btn-primary" id="closeModal" style="flex: 1; background: #27272a;">Cancel</button>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
